      <h1 class="text-4xl md:text-5xl font-bold tracking-tight leading-snug mb-8">
        什么是真正的爱与勇气？
      </h1>
      <div class="h-px w-full bg-gray-100"></div>
    </div>

    <article class="prose prose-lg prose-slate max-w-none text-gray-700 leading-relaxed">
      <p class="mb-6">很多人认为爱是一种感觉，但我现在越来越觉得，<strong>爱是一种能力，甚至是一种需要刻意练习的纪律。</strong></p>

      <p class="mb-6">当我们谈论勇气时，我们往往会联想到英雄主义。但对一个普通人来说，最大的勇气并不是去拯救世界，而是：</p>

      <ul class="list-disc pl-6 mb-8 space-y-3">
        <li>在看清了生活的琐碎与无奈后，依然能够把眼前的生活过好。</li>
        <li>允许自己是个普通人，也允许别人做个普通人。</li>
        <li>敢于打破常规，从零开始学习一个自己完全不了解的领域。</li>
      </ul>

      <blockquote class="border-l-4 border-black pl-6 my-10 italic text-2xl font-medium text-black">
        "真正的发现之旅，不在于寻找新的风景，而在于拥有新的眼光。"
      </blockquote>

      <p>（这里可以继续写下你关于爱和勇气的更多感悟...）</p>
    </article>
