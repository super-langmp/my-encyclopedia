<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>喜欢的话 | 人生笔记</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    .stagger-1 {
      animation: slideUp 0.6s 0.1s ease-out forwards;
      opacity: 0;
    }

    .stagger-2 {
      animation: slideUp 0.6s 0.2s ease-out forwards;
      opacity: 0;
    }

    .stagger-3 {
      animation: slideUp 0.6s 0.3s ease-out forwards;
      opacity: 0;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    ::-webkit-scrollbar {
      display: none;
    }
  </style>
</head>

<body class="bg-[#fcfcfc] text-black min-h-screen selection:bg-black selection:text-white">

  <header class="fixed top-0 w-full bg-[#fcfcfc]/90 backdrop-blur-xl z-50 border-b border-gray-100">
    <div class="max-w-4xl mx-auto px-8 h-20 flex items-center justify-between">
      <a href="index.html"
        class="text-sm font-medium text-gray-500 hover:text-black transition-colors flex items-center gap-2">
        <span>←</span> Home
      </a>
      <div class="text-sm font-bold tracking-widest uppercase">Quotes</div>
    </div>
  </header>

  <main class="max-w-4xl mx-auto px-8 pt-40 pb-32">
    <h1 class="text-5xl font-bold tracking-tighter mb-16 stagger-1">金句与随想</h1>

    <div class="space-y-8">
      <div class="p-8 border border-gray-200 bg-white hover:border-black transition-colors stagger-2">
        <p class="text-2xl font-medium leading-relaxed mb-4">"人生最困难的不是努力，也不是奋斗，而是做出正确的抉择。"</p>
        <p class="text-sm text-gray-400 uppercase tracking-widest">— 托尔斯泰</p>
      </div>

      <div class="p-8 border border-gray-200 bg-white hover:border-black transition-colors stagger-3">
        <p class="text-2xl font-medium leading-relaxed mb-4">"不要去追一匹马，用追马的时间种草，待到春暖花开时，就会有一批骏马任你挑选。"</p>
        <p class="text-sm text-gray-400 uppercase tracking-widest">— 读书笔记</p>
      </div>

      <div class="p-8 border border-gray-200 bg-white hover:border-black transition-colors stagger-3">
        <p class="text-2xl font-medium leading-relaxed mb-4">"高级的美学往往来源于极度的克制。删繁就简，把最核心的东西做到极致。"</p>
        <p class="text-sm text-gray-400 uppercase tracking-widest">— 个人感悟 · 2026</p>
      </div>
    </div>
  </main>

</body>

</html>
