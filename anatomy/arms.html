      <h1 class="text-4xl md:text-5xl font-bold tracking-tight leading-snug mb-8">胳膊：打破理论的壁垒，去执行。</h1>
      <div class="h-px w-full bg-gray-100"></div>
    </div>

    <article class="prose prose-lg prose-slate max-w-none text-gray-700 leading-relaxed">
      <h2 class="text-2xl font-bold text-black mt-10 mb-6">1. 肌肉合成与行动力</h2>
      <p>理论再完美，如果不去推起那根杠铃，肌肉就不会生长。这和做项目一样，很多人沉迷于构思完美的架构、画出最复杂的 UML 图，却迟迟写不出第一行代码。</p>
      <p>胳膊隐喻着我们与物理世界交互的直接力量。在科学训练中，我们需要给肌肉施加张力，破坏肌纤维，然后在休息中迎来超量恢复。人生也是如此，所有的成长都来自于“阻力训练”。去执行，去犯错，去修复，去变强。</p>

      <h2 class="text-2xl font-bold text-black mt-12 mb-6">2. 拒绝精神内耗，把力量用在刀刃上</h2>
      <p>把精力留给真正有商业价值和现实意义的事情。砍掉那些多余的情绪拉扯，像举铁一样，深呼吸，收紧核心，推出去。</p>
    </article>
  </main>
