      <h1 class="text-4xl md:text-5xl font-bold tracking-tight leading-snug mb-8">脚：千里之行，始于足下。</h1>
      <div class="h-px w-full bg-gray-100"></div>

    <article class="prose prose-lg prose-slate max-w-none text-gray-700 leading-relaxed">
      <h2 class="text-2xl font-bold text-black mt-10 mb-6">1. 抛开焦虑，脚踏实地</h2>
      <p>在这个充斥着各种“爆款脚本”和浮躁情绪的时代，保持高认知的最好方式，就是脚踏实地去走自己的路。</p>
      <p>不要去羡慕别人的终点，也不要因为自己刚下了一个 VS Code 而感到焦虑。每一个庞大的软件工程、每一个成功的自媒体账号、每一次体型的蜕变，都是靠双脚一步一步踩出来的。</p>

      <h2 class="text-2xl font-bold text-black mt-12 mb-6">2. 保持与现实的接触面积</h2>
      <p>脚掌是我们与大地的唯一接触面。保持踏实，意味着你要时刻与现实生活接轨，去解决那些真实存在的痛点（比如做一个能解决实际问题的修报系统或者点餐工具），而不是沉溺于虚无缥缈的幻想中。</p>
    </article>
  </main>
